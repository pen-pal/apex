# Runs the full test suite on every push and PR, so "tests passing" is a measured fact, not a hardcoded badge.
name: tests
# On push the deploy workflow's build job already runs the full suite before shipping, so this
# runs on pull requests (and on demand) — keeping the per-push runner load light for the deploy.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run stats

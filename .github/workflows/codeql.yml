# CodeQL code scanning for Apex.
# Analyzes the TypeScript/JavaScript source and the GitHub Actions workflows for security issues.
# https://docs.github.com/en/code-security/code-scanning
name: "CodeQL Advanced"

# CodeQL is heavy (two languages, security-extended). Running it on every push starved the
# GitHub Pages deploy of runners, so it runs on pull requests and a weekly schedule instead.
on:
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 7 * * 5'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # security-extended adds deeper security queries beyond the default set.
        queries: security-extended

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
